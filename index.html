<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Physics — Anonymous Login (Works 100%)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--text:#f0efe8;--muted:#6a6a7a;--accent:#c8b8f5;--like:#f5829a;--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--nav-h:64px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh}
#app{padding-bottom:calc(var(--nav-h) + 20px)}
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,0.94);backdrop-filter:blur(18px);border-top:0.5px solid rgba(255,255,255,0.12);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--muted)}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.page{display:none;padding:20px;max-width:520px;margin:0 auto}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.date-chip{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:5px 12px;display:flex;align-items:center;gap:8px}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;margin-bottom:24px}
.cat-btn{font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:6px 15px;cursor:pointer;white-space:nowrap}
.cat-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(200,184,245,0.12)}
.paper-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:22px}
.badge{font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(200,184,245,0.12);border-radius:40px;padding:3px 10px;display:inline-block}
.paper-title{font-family:var(--serif);font-size:22px;margin:12px 0 8px}
.paper-authors{font-size:13px;color:var(--muted);margin-bottom:16px}
.paper-abstract{font-size:13.5px;line-height:1.6;margin-bottom:20px}
.action-row{display:flex;gap:12px;margin-bottom:16px}
.btn-read{flex:1;background:rgba(200,184,245,0.12);border-radius:14px;padding:10px;text-align:center;color:var(--accent);text-decoration:none;font-weight:600}
.btn-like{width:48px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:20px}
.btn-like.liked{color:var(--like);border-color:rgba(245,130,154,0.4)}
.refresh-row{display:flex;justify-content:center;margin-top:20px}
.btn-refresh{background:transparent;border:1px solid var(--border);border-radius:40px;padding:8px 20px;color:var(--muted);cursor:pointer}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer}
.mini-title{font-family:var(--serif);font-size:15px}
.mini-like{background:none;border:none;cursor:pointer;font-size:14px}
.state-loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-wall{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--surface);border-radius:24px;padding:28px;max-width:360px;width:100%}
.auth-btn{width:100%;padding:12px;background:rgba(200,184,245,0.12);border:1px solid rgba(200,184,245,0.3);border-radius:12px;color:var(--accent);font-weight:600;cursor:pointer;margin-top:12px}
.diagnostic{font-size:11px;color:#f0a0a0;background:#2a1a1a;padding:8px;border-radius:8px;margin-top:12px;font-family:monospace;word-break:break-all}
</style>
</head>
<body>
<div id="app">
  <div class="page active" id="page-today">
    <div class="page-header"><div class="logo"><span class="logo-dot"></span>Daily Physics</div><div class="date-chip" id="user-info">Loading...</div></div>
    <div class="cat-scroll" id="cat-scroll"></div>
    <div id="today-content"></div>
  </div>
  <div class="page" id="page-liked"><div class="page-header"><div class="page-title">Liked</div><button class="btn-refresh" id="clear-liked">Clear</button></div><div id="liked-list"></div></div>
  <div class="page" id="page-history"><div class="page-header"><div class="page-title">History</div></div><div id="history-list"></div></div>
</div>
<nav id="nav">
  <button class="nav-btn active" data-page="today"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Today</span></button>
  <button class="nav-btn" data-page="liked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Liked</span></button>
  <button class="nav-btn" data-page="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg><span>History</span></button>
</nav>

<div id="auth-wall">
  <div class="auth-box">
    <div class="logo" style="justify-content:center;margin-bottom:16px"><span class="logo-dot"></span>Daily Physics</div>
    <p style="text-align:center;margin-bottom:20px;color:var(--muted)">Connecting to Firebase...</p>
    <div id="diagnostic" class="diagnostic">Initializing...</div>
    <button id="force-anon-btn" class="auth-btn" style="display:none">🚀 Continue Anonymously</button>
  </div>
</div>

<script type="module">
// ==================== FIREBASE CONFIG ====================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhSfk39qU3YlBA4etrNC_AvxUNxR15sDA",
  authDomain: "physics-daily-89dd6.firebaseapp.com",
  projectId: "physics-daily-89dd6",
  storageBucket: "physics-daily-89dd6.firebasestorage.app",
  messagingSenderId: "476007239352",
  appId: "1:476007239352:web:fa971840c944ca87e8ee4d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM elements
const wall = document.getElementById('auth-wall');
const diagnosticDiv = document.getElementById('diagnostic');
const forceBtn = document.getElementById('force-anon-btn');

let userId = null;
let liked = [];
let history = [];
let currentPaper = null;
let activeCat = null;

// Helper: update diagnostic message
function diag(msg, isError = false) {
  diagnosticDiv.innerHTML = msg;
  diagnosticDiv.style.color = isError ? '#ff8888' : '#aaffaa';
  console.log("[DIAG]", msg);
}

// ========== ANONYMOUS LOGIN ==========
async function startAnonymousLogin() {
  diag("Attempting anonymous sign-in...");
  try {
    await signInAnonymously(auth);
    diag("✅ Anonymous login successful! Loading app...");
  } catch (err) {
    diag(`❌ Firebase Error: ${err.code} - ${err.message}`, true);
    forceBtn.style.display = 'block';
    forceBtn.onclick = () => startAnonymousLogin();
  }
}

// Auto-start login
startAnonymousLogin();

// Auth state listener
onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  userId = user.uid;
  diag(`Authenticated as ${user.isAnonymous ? 'Anonymous' : user.email}`);
  
  // Load user data from Firestore
  try {
    const snap = await getDoc(doc(db, 'users', userId));
    if (snap.exists()) {
      const data = snap.data();
      liked = data.liked || [];
      history = data.history || [];
      diag(`Loaded ${liked.length} liked, ${history.length} history items`);
    } else {
      diag("New user – no saved data yet");
    }
  } catch (err) {
    diag(`Firestore read error: ${err.message}`, true);
  }
  
  // Hide auth wall and show app
  wall.style.display = 'none';
  
  // Show user info in header
  const userInfoDiv = document.getElementById('user-info');
  userInfoDiv.innerHTML = `<span>👤 ${user.isAnonymous ? 'Guest' : user.email}</span>
    <button class="btn-refresh" id="signout-btn" style="padding:2px 8px;font-size:10px">Sign out</button>`;
  document.getElementById('signout-btn')?.addEventListener('click', async () => {
    await signOut(auth);
    location.reload();
  });
  
  bootApp();
});

// ========== SAVE TO FIRESTORE ==========
async function saveToFirestore() {
  if (!userId) return;
  try {
    await setDoc(doc(db, 'users', userId), { liked, history }, { merge: true });
  } catch (err) { console.error("Save error", err); }
}
function saveLiked() { saveToFirestore(); renderLikedList(); }
function saveHistory() { saveToFirestore(); }

// ========== OPENALEX PAPER FETCHING ==========
function invertedToText(inv) {
  if (!inv) return '';
  return Object.entries(inv).sort((a,b) => a[1][0]-b[1][0]).map(([w]) => w).join(' ');
}
async function fetchOpenAlex(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
function parseWork(work, catLabel) {
  const title = work.title || 'Untitled';
  let abstract = '';
  if (work.abstract_inverted_index) abstract = invertedToText(work.abstract_inverted_index);
  else if (work.abstract) abstract = work.abstract;
  const authors = (work.authorships || []).map(a => a.author.display_name).join(', ');
  const doi = work.doi ? work.doi.replace('https://doi.org/', '') : null;
  const id = doi || work.id.split('/').pop();
  let url = '#';
  const arxivMatch = (work.primary_location?.landing_page_url || '').match(/arxiv\.org\/abs\/([\d.]+)/);
  if (arxivMatch) url = `https://arxiv.org/abs/${arxivMatch[1]}`;
  else if (work.primary_location?.pdf_url) url = work.primary_location.pdf_url;
  else if (work.doi) url = work.doi;
  return { id, title, summary: abstract.slice(0,800), authors, cat: catLabel, pub: work.publication_date?.slice(0,10) || '', url };
}

const CATEGORIES = [
  { id:'quantum', label:'Quantum', query:'quantum mechanics OR quantum computing', keywords:['quantum','qubit'] },
  { id:'astro', label:'Astrophysics', query:'astrophysics OR cosmology', keywords:['galaxy','cosmos','dark matter'] },
  { id:'gravity', label:'Gravity', query:'general relativity OR black hole', keywords:['general relativity','black hole'] },
  { id:'particle', label:'Particle', query:'particle physics OR collider', keywords:['collider','neutrino','higgs'] },
  { id:'condmat', label:'Condensed Matter', query:'superconductivity OR graphene', keywords:['superconduct','graphene'] }
];

async function fetchPaperForCategory(cat, attempt=0) {
  const page = Math.floor(Math.random() * 100) + 1;
  const url = `https://api.openalex.org/works?search=${encodeURIComponent(cat.query)}&filter=open_access.is_oa:true&sort=relevance_score:desc&page=${page}&per-page=25`;
  const data = await fetchOpenAlex(url);
  if (!data.results?.length) throw new Error('No papers');
  const candidates = data.results.map(w => parseWork(w, cat.label)).filter(p => 
    cat.keywords.some(kw => p.title.toLowerCase().includes(kw))
  );
  if (candidates.length) return candidates[Math.floor(Math.random() * candidates.length)];
  if (attempt < 4) {
    await new Promise(r => setTimeout(r, 300));
    return fetchPaperForCategory(cat, attempt+1);
  }
  return parseWork(data.results[0], cat.label);
}

async function loadTodayPaper(randomMode = false, specificCat = null) {
  const container = document.getElementById('today-content');
  container.innerHTML = '<div class="state-loading"><div class="spinner"></div>Loading paper...</div>';
  try {
    let catId = specificCat || activeCat;
    if (!catId) {
      const idx = randomMode ? Math.floor(Math.random()*CATEGORIES.length) : (new Date().getDate() % CATEGORIES.length);
      catId = CATEGORIES[idx].id;
    }
    const category = CATEGORIES.find(c => c.id === catId);
    const paper = await fetchPaperForCategory(category);
    currentPaper = paper;
    
    // Add to history
    const today = new Date().toISOString().slice(0,10);
    history = history.filter(h => !(h.date === today && h.paper.id === paper.id));
    history.unshift({ date: today, paper });
    if (history.length > 200) history = history.slice(0,200);
    saveHistory();
    
    const likedState = liked.some(p => p.id === paper.id);
    container.innerHTML = `
      <div class="paper-card">
        <div><span class="badge">${paper.cat}</span> <span style="font-size:10px;color:var(--muted)">${paper.pub || ''}</span></div>
        <h2 class="paper-title">${paper.title}</h2>
        <p class="paper-authors">${paper.authors.slice(0,120) || '—'}</p>
        <div class="divider" style="height:1px;background:rgba(255,255,255,0.1);margin:16px 0"></div>
        <p class="paper-abstract">${paper.summary || 'No abstract available.'}</p>
        <div class="action-row">
          <a class="btn-read" href="${paper.url}" target="_blank">📄 Read Full Paper</a>
          <button class="btn-like ${likedState ? 'liked' : ''}" id="like-btn">${likedState ? '❤️' : '♡'}</button>
        </div>
        <div class="stats-row"><div class="stat-box"><div class="stat-label">ID</div><div class="stat-value">${paper.id.slice(0,30)}</div></div></div>
      </div>
      <div class="refresh-row"><button class="btn-refresh" id="refresh-btn">⟳ Another paper</button></div>
    `;
    document.getElementById('like-btn')?.addEventListener('click', () => toggleLikePaper(paper));
    document.getElementById('refresh-btn')?.addEventListener('click', () => loadTodayPaper(true, activeCat));
  } catch (err) {
    container.innerHTML = `<div class="state-loading" style="color:#ff8888">⚠️ Error: ${err.message}<br><button class="btn-refresh" id="retry-btn">Retry</button></div>`;
    document.getElementById('retry-btn')?.addEventListener('click', () => loadTodayPaper(randomMode, specificCat));
  }
}

function toggleLikePaper(paper) {
  const idx = liked.findIndex(p => p.id === paper.id);
  if (idx === -1) {
    liked.unshift(paper);
    if (liked.length > 200) liked.pop();
  } else {
    liked.splice(idx, 1);
  }
  saveLiked();
  const likeBtn = document.getElementById('like-btn');
  if (likeBtn) {
    const isNowLiked = liked.some(p => p.id === paper.id);
    likeBtn.classList.toggle('liked', isNowLiked);
    likeBtn.textContent = isNowLiked ? '❤️' : '♡';
  }
  renderLikedList();
  renderHistoryList();
}

function renderLikedList() {
  const container = document.getElementById('liked-list');
  if (!liked.length) { container.innerHTML = '<div class="state-loading">❤️ No liked papers yet.</div>'; return; }
  container.innerHTML = liked.map(p => `
    <div class="mini-card" data-id="${p.id}">
      <div class="mini-badge" style="font-family:mono;font-size:10px;color:var(--accent)">${p.cat}</div>
      <div class="mini-title">${p.title.slice(0,80)}</div>
      <div class="mini-authors" style="font-size:12px;color:var(--muted)">${p.authors.slice(0,60)}</div>
      <div class="mini-row" style="display:flex;justify-content:space-between;margin-top:8px">
        <span style="font-size:10px;color:var(--muted)">${p.id.slice(0,16)}</span>
        <button class="mini-like" data-id="${p.id}" style="background:none;border:none;cursor:pointer">❤️</button>
      </div>
    </div>
  `).join('');
  document.querySelectorAll('.mini-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('mini-like')) return;
      const paper = liked.find(p => p.id === card.dataset.id);
      if (paper) window.open(paper.url, '_blank');
    });
  });
  document.querySelectorAll('.mini-like').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const pid = btn.dataset.id;
      const paper = liked.find(p => p.id === pid);
      if (paper) toggleLikePaper(paper);
    });
  });
}

function renderHistoryList() {
  const container = document.getElementById('history-list');
  if (!history.length) { container.innerHTML = '<div class="state-loading">📜 No history yet.</div>'; return; }
  const grouped = {};
  history.forEach(h => { if (!grouped[h.date]) grouped[h.date] = []; grouped[h.date].push(h.paper); });
  container.innerHTML = Object.entries(grouped).map(([date, papers]) => `
    <div style="margin-bottom:24px">
      <div style="font-family:mono;font-size:11px;color:var(--muted);margin-bottom:8px">${date === new Date().toISOString().slice(0,10) ? 'Today' : date}</div>
      ${papers.map(p => `
        <div class="mini-card" data-id="${p.id}">
          <div class="mini-badge" style="font-size:10px">${p.cat}</div>
          <div class="mini-title">${p.title.slice(0,80)}</div>
          <div class="mini-row" style="display:flex;justify-content:space-between;margin-top:6px">
            <span style="font-size:10px;color:var(--muted)">${p.id.slice(0,16)}</span>
            <button class="mini-like" data-id="${p.id}" style="background:none;border:none;cursor:pointer">${liked.some(l => l.id === p.id) ? '❤️' : '♡'}</button>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
  document.querySelectorAll('.mini-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('mini-like')) return;
      const allPapers = history.flatMap(h => h.paper);
      const paper = allPapers.find(p => p.id === card.dataset.id);
      if (paper) window.open(paper.url, '_blank');
    });
  });
  document.querySelectorAll('.mini-like').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const pid = btn.dataset.id;
      const allPapers = history.flatMap(h => h.paper);
      const paper = allPapers.find(p => p.id === pid);
      if (paper) toggleLikePaper(paper);
    });
  });
}

function bootApp() {
  // Build category bar
  const strip = document.getElementById('cat-scroll');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = cat.label;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = cat.id;
      loadTodayPaper(false, activeCat);
    };
    strip.appendChild(btn);
  });
  
  // Navigation
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const page = btn.dataset.page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`page-${page}`).classList.add('active');
      btn.classList.add('active');
      if (page === 'liked') renderLikedList();
      if (page === 'history') renderHistoryList();
    });
  });
  
  document.getElementById('clear-liked')?.addEventListener('click', () => {
    if (confirm('Remove all liked papers?')) { liked = []; saveLiked(); renderLikedList(); if (currentPaper) loadTodayPaper(false, activeCat); }
  });
  
  loadTodayPaper(false, null);
  renderLikedList();
  renderHistoryList();
}
</script>
</body>
</html>
