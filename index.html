<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily Physics — Auth Works</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#f0efe8;--muted:#6a6a7a;--muted2:#9a9aaa;--accent:#c8b8f5;--accent-dim:rgba(200,184,245,0.12);--like:#f5829a;--like-dim:rgba(245,130,154,0.12);--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--nav-h:64px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh}
#app{padding-bottom:calc(var(--nav-h) + 20px)}
#nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,20,0.94);backdrop-filter:blur(18px);border-top:1px solid rgba(255,255,255,0.1);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--muted)}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.page{display:none;padding:20px;max-width:520px;margin:0 auto}
.page.active{display:block}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.date-chip{font-family:var(--mono);font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:5px 12px;display:flex;align-items:center;gap:8px}
.cat-scroll{display:flex;gap:10px;overflow-x:auto;margin-bottom:24px}
.cat-btn{font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:40px;padding:6px 15px;cursor:pointer;white-space:nowrap}
.cat-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.paper-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:22px}
.badge{font-family:var(--mono);font-size:10px;color:var(--accent);background:var(--accent-dim);border-radius:40px;padding:3px 10px;display:inline-block}
.paper-title{font-family:var(--serif);font-size:22px;margin:12px 0 8px}
.paper-authors{font-size:13px;color:var(--muted);margin-bottom:16px}
.paper-abstract{font-size:13.5px;line-height:1.6;margin-bottom:20px}
.action-row{display:flex;gap:12px;margin-bottom:16px}
.btn-read{flex:1;background:var(--accent-dim);border-radius:14px;padding:10px;text-align:center;color:var(--accent);text-decoration:none;font-weight:600}
.btn-like{width:48px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;cursor:pointer;font-size:20px}
.btn-like.liked{color:var(--like);border-color:rgba(245,130,154,0.4)}
.refresh-row{display:flex;justify-content:center;margin-top:20px}
.btn-refresh{background:transparent;border:1px solid var(--border);border-radius:40px;padding:8px 20px;color:var(--muted);cursor:pointer}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer}
.mini-title{font-family:var(--serif);font-size:15px}
.mini-like{background:none;border:none;cursor:pointer;font-size:14px}
.state-loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
#auth-wall{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--surface);border-radius:24px;padding:28px;max-width:360px;width:100%}
.auth-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:12px;color:white}
.auth-btn{width:100%;padding:12px;background:var(--accent-dim);border:none;border-radius:12px;color:var(--accent);font-weight:600;cursor:pointer;margin-top:8px}
.auth-btn-secondary{background:var(--surface2);color:var(--text)}
.auth-err{font-size:12px;color:#ff8888;background:#2a1a1a;padding:8px;border-radius:8px;margin-top:12px;display:none}
.auth-tabs{display:flex;gap:8px;margin-bottom:20px}
.auth-tab{flex:1;background:var(--surface2);border:none;border-radius:12px;padding:8px;color:var(--muted);cursor:pointer}
.auth-tab.active{background:var(--accent-dim);color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <div class="page active" id="page-today">
    <div class="page-header"><div class="logo"><span class="logo-dot"></span>Daily Physics</div><div class="date-chip" id="user-info"></div></div>
    <div class="cat-scroll" id="cat-scroll"></div>
    <div id="today-content"></div>
  </div>
  <div class="page" id="page-liked"><div class="page-header"><div class="page-title">Liked</div><button class="btn-refresh" id="clear-liked">Clear</button></div><div id="liked-list"></div></div>
  <div class="page" id="page-history"><div class="page-header"><div class="page-title">History</div></div><div id="history-list"></div></div>
  <div class="page" id="page-rec"><div class="page-header"><div class="page-title">For You</div></div><div id="rec-content"></div></div>
</div>
<nav id="nav">
  <button class="nav-btn active" data-page="today"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>Today</span></button>
  <button class="nav-btn" data-page="liked"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Liked</span></button>
  <button class="nav-btn" data-page="history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><polyline points="12 8 12 12 14 14"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/></svg><span>History</span></button>
  <button class="nav-btn" data-page="rec"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>For You</span></button>
</nav>

<div id="auth-wall">
  <div class="auth-box">
    <div class="logo" style="justify-content:center;margin-bottom:16px"><span class="logo-dot"></span>Daily Physics</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Log in</button>
      <button class="auth-tab" id="tab-signup">Sign up</button>
    </div>
    <input class="auth-field" id="email" type="email" placeholder="Email">
    <input class="auth-field" id="password" type="password" placeholder="Password">
    <button class="auth-btn" id="submit-auth">Log in</button>
    <button class="auth-btn auth-btn-secondary" id="anonymous-auth">🚀 Anonymous</button>
    <div class="auth-err" id="auth-error"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBhSfk39qU3YlBA4etrNC_AvxUNxR15sDA",
  authDomain: "physics-daily-89dd6.firebaseapp.com",
  projectId: "physics-daily-89dd6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;
let liked = [];
let history = [];
let currentPaper = null;
let activeCat = null;

// localStorage helpers
function loadStorage() {
  if (!currentUser) return;
  const likedKey = `liked_${currentUser.uid}`;
  const historyKey = `history_${currentUser.uid}`;
  liked = JSON.parse(localStorage.getItem(likedKey) || '[]');
  history = JSON.parse(localStorage.getItem(historyKey) || '[]');
}
function saveStorage() {
  if (!currentUser) return;
  localStorage.setItem(`liked_${currentUser.uid}`, JSON.stringify(liked));
  localStorage.setItem(`history_${currentUser.uid}`, JSON.stringify(history));
  updateBadge();
}
function updateBadge() { /* optional */ }
function isLiked(id) { return liked.some(p => p.id === id); }
function toggleLike(paper) {
  if (isLiked(paper.id)) liked = liked.filter(p => p.id !== paper.id);
  else liked.unshift(paper);
  saveStorage();
  renderLiked();
  renderHistory();
  if (currentPaper && currentPaper.id === paper.id) {
    const btn = document.getElementById('like-btn');
    if (btn) { btn.classList.toggle('liked', isLiked(paper.id)); btn.textContent = isLiked(paper.id) ? '❤️' : '♡'; }
  }
}

// Auth UI
const wall = document.getElementById('auth-wall');
const emailInput = document.getElementById('email');
const passInput = document.getElementById('password');
const submitBtn = document.getElementById('submit-auth');
const anonBtn = document.getElementById('anonymous-auth');
const errorDiv = document.getElementById('auth-error');
const tabLogin = document.getElementById('tab-login');
const tabSignup = document.getElementById('tab-signup');
let authMode = 'login';

tabLogin.onclick = () => { authMode = 'login'; tabLogin.classList.add('active'); tabSignup.classList.remove('active'); submitBtn.textContent = 'Log in'; errorDiv.style.display = 'none'; };
tabSignup.onclick = () => { authMode = 'signup'; tabSignup.classList.add('active'); tabLogin.classList.remove('active'); submitBtn.textContent = 'Sign up'; errorDiv.style.display = 'none'; };

async function handleAuth() {
  const email = emailInput.value.trim();
  const password = passInput.value;
  if (!email || !password) { showError('Please fill both fields'); return; }
  submitBtn.disabled = true; submitBtn.textContent = '...';
  try {
    if (authMode === 'signup') await createUserWithEmailAndPassword(auth, email, password);
    else await signInWithEmailAndPassword(auth, email, password);
  } catch (err) { showError(friendlyError(err.code)); submitBtn.disabled = false; submitBtn.textContent = authMode === 'login' ? 'Log in' : 'Sign up'; }
}
async function handleAnonymous() {
  anonBtn.disabled = true; anonBtn.textContent = '...';
  try { await signInAnonymously(auth); } catch (err) { showError(friendlyError(err.code)); anonBtn.disabled = false; anonBtn.textContent = 'Anonymous'; }
}
function showError(msg) { errorDiv.textContent = msg; errorDiv.style.display = 'block'; }
function friendlyError(code) {
  const map = { 'auth/email-already-in-use':'Email already used','auth/invalid-email':'Invalid email','auth/weak-password':'Password min 6 chars','auth/user-not-found':'No account','auth/wrong-password':'Wrong password','auth/operation-not-allowed':'Enable Email/Password in Firebase console','auth/unauthorized-domain':'Add this domain to Firebase authorized domains' };
  return map[code] || code;
}
submitBtn.onclick = handleAuth;
anonBtn.onclick = handleAnonymous;
[emailInput, passInput].forEach(f => f.addEventListener('keypress', e => { if (e.key === 'Enter') handleAuth(); }));

onAuthStateChanged(auth, user => {
  if (!user) return;
  currentUser = user;
  loadStorage();
  wall.style.display = 'none';
  document.getElementById('user-info').innerHTML = `<span>${user.isAnonymous ? 'Anonymous' : user.email}</span><button class="btn-refresh" id="signout-btn" style="padding:2px 8px">Sign out</button>`;
  document.getElementById('signout-btn').onclick = async () => { await signOut(auth); location.reload(); };
  bootApp();
});

// OpenAlex
async function fetchOpenAlex(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
function parseWork(work, cat) {
  const title = work.title || 'Untitled';
  let abstract = '';
  if (work.abstract_inverted_index) {
    const words = Object.entries(work.abstract_inverted_index).sort((a,b)=>a[1][0]-b[1][0]);
    abstract = words.map(([w]) => w).join(' ');
  }
  const authors = (work.authorships || []).map(a => a.author.display_name).join(', ');
  const id = work.doi ? work.doi.replace('https://doi.org/','') : work.id.split('/').pop();
  let url = work.doi || work.id;
  const arxiv = work.primary_location?.landing_page_url?.match(/arxiv\.org\/abs\/([\d.]+)/)?.[1];
  if (arxiv) url = `https://arxiv.org/abs/${arxiv}`;
  return { id, title, summary: abstract.slice(0,600), authors, cat, pub: work.publication_date?.slice(0,10) || '', url };
}
const CATEGORIES = [
  { id:'quantum', label:'Quantum', query:'quantum mechanics OR quantum computing', keywords:['quantum','qubit'] },
  { id:'astro', label:'Astro', query:'astrophysics OR cosmology', keywords:['galaxy','cosmos'] },
  { id:'gravity', label:'Gravity', query:'general relativity OR black hole', keywords:['general relativity','black hole'] }
];
async function fetchPaper(cat, attempt=0) {
  const page = Math.floor(Math.random()*50)+1;
  const url = `https://api.openalex.org/works?search=${encodeURIComponent(cat.query)}&filter=open_access.is_oa:true&page=${page}&per-page=20`;
  const data = await fetchOpenAlex(url);
  if (!data.results?.length) throw new Error('No papers');
  const candidates = data.results.map(w => parseWork(w, cat.label)).filter(p => cat.keywords.some(k => p.title.toLowerCase().includes(k)));
  if (candidates.length) return candidates[Math.floor(Math.random()*candidates.length)];
  if (attempt<3) return fetchPaper(cat, attempt+1);
  return parseWork(data.results[0], cat.label);
}
async function loadToday() {
  const container = document.getElementById('today-content');
  container.innerHTML = '<div class="state-loading"><div class="spinner"></div>Loading...</div>';
  try {
    let cat = activeCat || CATEGORIES[new Date().getDate() % CATEGORIES.length].id;
    const category = CATEGORIES.find(c => c.id === cat);
    const paper = await fetchPaper(category);
    currentPaper = paper;
    history.unshift({ date: new Date().toISOString().slice(0,10), paper });
    if (history.length > 100) history = history.slice(0,100);
    saveStorage();
    renderToday(paper);
    renderHistory();
  } catch(e) {
    container.innerHTML = `<div class="state-loading">Error: ${e.message}<br><button class="btn-refresh" onclick="location.reload()">Retry</button></div>`;
  }
}
function renderToday(p) {
  const container = document.getElementById('today-content');
  const likedState = isLiked(p.id);
  container.innerHTML = `
    <div class="paper-card">
      <div><span class="badge">${p.cat}</span> <span style="font-size:10px">${p.pub}</span></div>
      <h2 class="paper-title">${p.title}</h2>
      <p class="paper-authors">${p.authors.slice(0,120)}</p>
      <div class="divider"></div>
      <p class="paper-abstract">${p.summary || 'No abstract'}</p>
      <div class="action-row">
        <a class="btn-read" href="${p.url}" target="_blank">📄 Read</a>
        <button class="btn-like ${likedState ? 'liked' : ''}" id="like-btn">${likedState ? '❤️' : '♡'}</button>
      </div>
    </div>
    <div class="refresh-row"><button class="btn-refresh" id="refresh-btn">⟳ Another</button></div>
  `;
  document.getElementById('like-btn').onclick = () => toggleLike(p);
  document.getElementById('refresh-btn').onclick = () => loadToday();
}
function renderLiked() {
  const div = document.getElementById('liked-list');
  if (!liked.length) { div.innerHTML = '<div class="state-loading">❤️ No liked papers</div>'; return; }
  div.innerHTML = liked.map(p => `<div class="mini-card" data-id="${p.id}"><div class="mini-title">${p.title.slice(0,80)}</div><div class="mini-row"><span style="font-size:10px">${p.id.slice(0,16)}</span><button class="mini-like" data-id="${p.id}">❤️</button></div></div>`).join('');
  document.querySelectorAll('.mini-card').forEach(card => card.onclick = (e) => { if(!e.target.classList.contains('mini-like')) window.open(liked.find(p=>p.id===card.dataset.id)?.url, '_blank'); });
  document.querySelectorAll('.mini-like').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); const paper = liked.find(p=>p.id===btn.dataset.id); if(paper) toggleLike(paper); });
}
function renderHistory() {
  const div = document.getElementById('history-list');
  if (!history.length) { div.innerHTML = '<div class="state-loading">📜 No history</div>'; return; }
  div.innerHTML = history.slice(0,30).map(h => `<div class="mini-card" data-id="${h.paper.id}"><div class="mini-title">${h.paper.title.slice(0,80)}</div><div class="mini-row"><span style="font-size:10px">${h.date}</span><button class="mini-like" data-id="${h.paper.id}">${isLiked(h.paper.id)?'❤️':'♡'}</button></div></div>`).join('');
  document.querySelectorAll('.mini-card').forEach(card => card.onclick = (e) => { if(!e.target.classList.contains('mini-like')) window.open(history.find(h=>h.paper.id===card.dataset.id)?.paper.url, '_blank'); });
  document.querySelectorAll('.mini-like').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); const entry = history.find(h=>h.paper.id===btn.dataset.id); if(entry) toggleLike(entry.paper); });
}
function setupRec() {
  const recDiv = document.getElementById('rec-content');
  recDiv.innerHTML = `<button class="btn-refresh" id="gen-rec">✨ Generate recommendations</button><div id="rec-list"></div>`;
  document.getElementById('gen-rec').onclick = async () => {
    const recList = document.getElementById('rec-list');
    recList.innerHTML = '<div class="state-loading"><div class="spinner"></div>Searching...</div>';
    const seeds = [currentPaper, ...liked.slice(0,3)].filter(Boolean);
    if (!seeds.length) { recList.innerHTML = '<div class="state-loading">Like some papers first</div>'; return; }
    const keywords = seeds.map(p => p.title.split(' ').slice(0,3)).flat().slice(0,3);
    const url = `https://api.openalex.org/works?search=${encodeURIComponent(keywords.join(' '))}&filter=open_access.is_oa:true&per-page=10`;
    const data = await fetchOpenAlex(url);
    const recs = data.results.map(w => parseWork(w, 'Rec')).filter(p => !isLiked(p.id) && p.id !== currentPaper?.id).slice(0,6);
    if (!recs.length) recList.innerHTML = '<div class="state-loading">No recommendations</div>';
    else recList.innerHTML = recs.map(p => `<div class="mini-card" data-id="${p.id}"><div class="mini-title">${p.title.slice(0,80)}</div><button class="mini-like" data-id="${p.id}">❤️</button></div>`).join('');
    document.querySelectorAll('#rec-list .mini-card').forEach(card => card.onclick = (e) => { if(!e.target.classList.contains('mini-like')) window.open(recs.find(p=>p.id===card.dataset.id)?.url, '_blank'); });
    document.querySelectorAll('#rec-list .mini-like').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); const paper = recs.find(p=>p.id===btn.dataset.id); if(paper) toggleLike(paper); });
  };
}
function bootApp() {
  const strip = document.getElementById('cat-scroll');
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c.label;
    btn.onclick = () => { document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); activeCat = c.id; loadToday(); };
    strip.appendChild(btn);
  });
  loadToday();
  renderLiked();
  renderHistory();
  setupRec();
  document.getElementById('clear-liked').onclick = () => { if(confirm('Clear all liked?')) { liked = []; saveStorage(); renderLiked(); } };
  document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    btn.classList.add('active');
    if (page === 'liked') renderLiked();
    if (page === 'history') renderHistory();
    if (page === 'rec') setupRec();
  });
}
</script>
</body>
</html>
